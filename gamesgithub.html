chars.forEach(c=>groups[c]=[]);
files.forEach(f=>{
  const lower = (''+f).toLowerCase();
  if (lower.startsWith('cl')) {
    const after = lower.substring(2);
    if (after.length>0) {
      const c = after[0].toUpperCase();
      if (groups[c]) groups[c].push(f);
      else groups[c]=[f];
    } else {
      if (!groups['#']) groups['#']=[];
      groups['#'].push(f);

  const b=document.createElement('button');

  b.onclick=()=>document.getElementById('sec-'+c)?.scrollIntoView({behavior:'smooth',block:'start'});

  const sec=document.createElement('div');
  sec.className='section';
  sec.id='sec-'+c;
  const h2=document.createElement('h2');h2.textContent=c;sec.appendChild(h2);
  const grid=document.createElement('div');grid.className='grid';
  if(groups[c]&&groups[c].length){
    groups[c].forEach(f=>{
      const btn=document.createElement('button');
      btn.className='game-btn';
      btn.textContent=f;
      btn.onclick=()=>openGame(f);
      grid.appendChild(btn);
    });

    const p=document.createElement('div');
    p.className='small';

let scrollPos = 0;

function openGame(f){
  scrollPos = document.getElementById('main').scrollTop;
  document.getElementById('main').style.display='none';
  document.getElementById('sidebar').style.display='none';
  viewer.src = 'https://cdn.jsdelivr.net/gh/bubbls/ugs-singlefile/' + encodeURIComponent(f) + '.html';
  viewer.style.display='block';
  backBtn.style.display='block';
}

backBtn.onclick = ()=>{
  viewer.src='';
  viewer.style.display='none';
  backBtn.style.display='none';
  document.getElementById('main').style.display='block';
  document.getElementById('sidebar').style.display='flex';
  document.getElementById('main').scrollTop = scrollPos;
};

// search
const searchInput=document.getElementById('search');
function applySearch(term){
  term=(term||'').toLowerCase();
  document.querySelectorAll('.game-btn').forEach(btn=>{
    btn.style.display=btn.textContent.toLowerCase().includes(term)?'inline-flex':'none';
  });
}
document.getElementById('searchBtn').onclick=()=>applySearch(searchInput.value);
document.getElementById('clearBtn').onclick=()=>{searchInput.value='';applySearch('');};
searchInput.addEventListener('input',()=>applySearch(searchInput.value));
</script>

</body>
